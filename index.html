<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-soft: #1e293b;
            --surface: rgba(15, 23, 42, 0.72);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --accent-1: #22d3ee;
            --accent-2: #f59e0b;
            --outline: rgba(148, 163, 184, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: "Space Grotesk", "Segoe UI", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(900px 500px at 10% -20%, rgba(34, 211, 238, 0.28), transparent 60%),
                radial-gradient(900px 500px at 100% 120%, rgba(245, 158, 11, 0.22), transparent 60%),
                linear-gradient(140deg, var(--bg-deep), var(--bg-soft));
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: -200px;
            background-image: linear-gradient(rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            background-size: 36px 36px;
            mask-image: radial-gradient(circle at center, black 45%, transparent 90%);
            pointer-events: none;
            z-index: 0;
        }

        .panel {
            position: relative;
            z-index: 1;
            width: min(640px, 100%);
            padding: 38px 28px;
            border-radius: 24px;
            border: 1px solid var(--outline);
            background: var(--surface);
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 55px rgba(2, 6, 23, 0.45);
            animation: fade-in 700ms ease-out;
        }

        h1 {
            margin: 0 0 10px;
            font-family: "Sora", "Segoe UI", sans-serif;
            font-size: clamp(1.9rem, 4vw, 2.7rem);
            letter-spacing: 0.02em;
        }

        p {
            margin: 0;
            color: var(--text-muted);
            font-size: clamp(0.95rem, 2.7vw, 1.08rem);
        }

        .actions {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-height: 54px;
            border-radius: 14px;
            border: 1px solid transparent;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.01em;
            text-decoration: none;
            transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease;
        }

        .design-one {
            color: #0f172a;
            background: linear-gradient(135deg, #67e8f9, #22d3ee);
            box-shadow: 0 8px 24px rgba(34, 211, 238, 0.32);
        }

        .design-two {
            color: #0f172a;
            background: linear-gradient(135deg, #fcd34d, #f59e0b);
            box-shadow: 0 8px 24px rgba(245, 158, 11, 0.32);
        }

        a:hover,
        a:focus-visible {
            transform: translateY(-3px);
            border-color: rgba(248, 250, 252, 0.65);
            outline: none;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 560px) {
            .panel {
                padding: 30px 20px;
            }

            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Calculator Showcase</h1>
        <p>Pick a style to open the calculator design you want to explore.</p>

        <section class="actions" aria-label="Design options">
            <a class="design-one" href="Design 1/index.html">Open Design 1</a>
            <a class="design-two" href="Design 2/Index.html">Open Design 2</a>
        </section>
    </main>
</body>
</html>
