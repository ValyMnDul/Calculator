<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        :root {
            --bg: #f3f4f6;
            --card: #ffffff;
            --text-main: #111827;
            --text-muted: #4b5563;
            --border: #d1d5db;
            --button: #2563eb;
            --button-hover: #1d4ed8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 32px 16px;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background: var(--bg);
        }

        .panel {
            width: min(480px, 100%);
            padding: 28px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--card);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.8rem;
            font-weight: 700;
        }

        p {
            margin: 0;
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.5;
        }

        .actions {
            margin-top: 22px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            min-height: 44px;
            border-radius: 8px;
            border: 1px solid transparent;
            font-size: 0.98rem;
            font-weight: 600;
            text-decoration: none;
            transition: background-color 120ms ease;
        }

        .design-one {
            color: #ffffff;
            background: var(--button);
        }

        .design-two {
            color: var(--text-main);
            background: #e5e7eb;
            border-color: var(--border);
        }

        a:hover,
        a:focus-visible {
            background: var(--button-hover);
            color: #ffffff;
            outline: none;
        }

        @media (max-width: 560px) {
            .panel {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <main class="panel">
        <h1>Calculator</h1>
        <p>Alege varianta de calculator pe care vrei sa o deschizi.</p>

        <section class="actions" aria-label="Design options">
            <a class="design-one" href="Design 1/index.html">Deschide Design 1</a>
            <a class="design-two" href="Design 2/Index.html">Deschide Design 2</a>
        </section>
    </main>
</body>
</html>
